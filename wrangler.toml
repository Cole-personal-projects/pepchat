# Legacy Cloudflare Pages project name; preserved because the slug is immutable
# and the sidebarchat.net custom domain is bound to it. Not user-visible.
name = "pepchat-app"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".vercel/output/static"

[vars]
# Non-secret environment variables go here.
# Do not duplicate names that already exist as Pages secrets; Cloudflare
# rejects Pages Functions builds when a [vars] binding and secret share a name.
# LiveKit runtime values are currently managed as encrypted Pages secrets:
# LIVEKIT_URL
# LIVEKIT_API_KEY
# LIVEKIT_API_SECRET
